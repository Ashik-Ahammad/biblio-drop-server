name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-update-infra:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/bibliodrop-backend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/bibliodrop-backend:${{ github.sha }}

    - name: Checkout Infra Repo
      uses: actions/checkout@v4
      with:
        repository: Ashik-Ahammad/biblio-drop-infra
        token: ${{ secrets.INFRA_REPO_TOKEN }}
        path: infra-repo

    - name: Update Manifest
      run: |
        cd infra-repo
        mkdir -p k8s
        
        if [ ! -f k8s/backend-deployment.yaml ]; then
          cat <<EOF > k8s/backend-deployment.yaml
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: backend
        spec:
          template:
            spec:
              imagePullSecrets:
              - name: dockerhub-secret
              containers:
              - name: backend
                image: ${{ secrets.DOCKERHUB_USERNAME }}/bibliodrop-backend:${{ github.sha }}
        EOF
        else
          sed -i -E "s|(image: ${{ secrets.DOCKERHUB_USERNAME }}/bibliodrop-backend):.*|\1:${{ github.sha }}|g" k8s/backend-deployment.yaml
        fi
        
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add k8s/backend-deployment.yaml
        git diff-index --quiet HEAD || git commit -m "update backend image: ${{ github.sha }} [skip ci]"
        git push origin main
